<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Freud • A Companion</title>

    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --bg-1: #06281f; /* deep emerald */
        --bg-2: #041914; /* darker emerald */
        --panel: rgba(0, 0, 0, 0.75);
        --panel-2: rgba(0, 0, 0, 0.35);

        --input-bg: #0b3d2e;

        --user: #1fa97a; /* emerald accent */
        --freud: #0f2f26; /* dark green bubble */

        --text: #e8fff6;
        --muted: #9fe3c5;

        --border: #d4af37; /* GOLD */
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      body {
        font-family: system-ui, sans-serif;
        background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
        color: var(--text);
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      header {
        background: var(--panel);
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border-bottom: 3px solid var(--border);
        flex: 0 0 auto;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        min-width: 0;
        flex: 1;
      }

      .header-left > div {
        min-width: 0;
      }

      .header-left h1,
      .header-left p {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .avatar {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid var(--border);
        flex: 0 0 52px;
        box-shadow: 0 0 12px rgba(212, 175, 55, 0.6);
      }

      .chat {
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        background: var(--panel-2);
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
      }

      .message {
        max-width: 80%;
        padding: 14px 20px;
        border-radius: 20px;
        line-height: 1.6;
        position: relative;
        word-break: break-word;
        overflow-wrap: anywhere;
        white-space: normal;
      }

      .user {
        align-self: flex-end;
        background: var(--user);
        color: white;
        border-bottom-right-radius: 4px;
      }

      .freud {
        align-self: flex-start;
        background: var(--freud);
        color: var(--text);
        border-bottom-left-radius: 4px;
      }

      .voice-badge {
        position: absolute;
        left: 10px;
        top: 8px;
        font-size: 14px;
        opacity: 0.8;
      }

      .status {
        text-align: center;
        padding: 8px 12px;
        color: var(--muted);
        font-size: 0.9em;
        flex: 0 0 auto;
      }

      .input-area {
        padding: 14px;
        padding-bottom: calc(14px + env(safe-area-inset-bottom));
        background: rgba(0, 0, 0, 0.8);
        display: flex;
        gap: 8px;
        align-items: center;
        flex: 0 0 auto;
      }

      input {
        flex: 1;
        min-width: 0;
        padding: 16px 20px;
        border-radius: 30px;
        border: none;
        background: var(--input-bg);
        color: var(--text);
        font-size: 16px;
        outline: none;
      }

      input::placeholder {
        color: rgba(255, 230, 240, 0.65);
      }

      button {
        padding: 14px;
        background: var(--user);
        color: white;
        border: none;
        border-radius: 50%;
        cursor: pointer;
        font-size: 18px;
        min-width: 48px;
        min-height: 48px;
        flex: 0 0 auto;
      }

      .install-btn {
        background: #d4af37;   
        color: #06281f;        
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 13px;
        cursor: pointer;
        min-width: auto;
        min-height: auto;
        white-space: nowrap;
      }

      .modal {
        display: none;
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.92);
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 16px;
      }

      .modal img {
        max-width: 90%;
        max-height: 90%;
        border-radius: 12px;
      }

      .message-content p {
        margin: 0 0 10px;
      }

      .message-content p:last-child {
        margin-bottom: 0;
      }

      .message-content ul,
      .message-content ol {
        margin: 8px 0 10px 20px;
        padding: 0;
      }

      .message-content li + li {
        margin-top: 4px;
      }

      .message-content strong {
        color: #ffd4e4;
      }

      .code-block {
        margin: 10px 0;
        background: var(--code-bg);
        border: 1px solid var(--code-border);
        border-radius: 14px;
        overflow: hidden;
      }

      .code-label {
        padding: 8px 12px;
        font-size: 12px;
        color: var(--muted);
        border-bottom: 1px solid var(--code-border);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      pre {
        margin: 0;
        padding: 12px 14px;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 14px;
        line-height: 1.55;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        color: #fff4f8;
      }

      .typing-row {
        display: inline-flex;
        gap: 6px;
        align-items: center;
        min-height: 20px;
      }

      .typing-dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: #ffc2d6;
        opacity: 0.5;
        animation: pulse 1s infinite ease-in-out;
      }

      .typing-dot:nth-child(2) {
        animation-delay: 0.15s;
      }
      .typing-dot:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: translateY(0);
          opacity: 0.35;
        }
        50% {
          transform: translateY(-2px);
          opacity: 1;
        }
      }

      @media (max-width: 768px) {
        header {
          padding: 10px 12px;
          align-items: flex-start;
        }

        .avatar {
          width: 44px;
          height: 44px;
          flex-basis: 44px;
        }

        .header-left h1 {
          font-size: 1.05rem !important;
        }
        .header-left p {
          font-size: 0.82rem !important;
        }

        .install-btn {
          padding: 8px 12px;
          font-size: 12px;
          border-radius: 16px;
          align-self: center;
        }

        .chat {
          padding: 12px;
          gap: 12px;
        }

        .message {
          max-width: 92%;
          padding: 12px 14px;
          font-size: 15px;
          line-height: 1.5;
        }

        .input-area {
          padding: 10px;
          padding-bottom: calc(10px + env(safe-area-inset-bottom));
          gap: 6px;
        }

        input {
          padding: 14px 16px;
          font-size: 16px;
        }

        button {
          min-width: 44px;
          min-height: 44px;
          padding: 12px;
          font-size: 16px;
        }
      }

      @media (max-width: 480px) {
        header {
          padding: 10px;
          gap: 8px;
        }

        .header-left {
          gap: 10px;
        }
        .header-left h1 {
          font-size: 0.98rem !important;
        }
        .header-left p {
          font-size: 0.76rem !important;
        }

        .install-btn {
          padding: 7px 10px;
          font-size: 11px;
        }

        .chat {
          padding: 10px;
        }

        .message {
          max-width: 95%;
          font-size: 14px;
          padding: 11px 13px;
        }

        .status {
          font-size: 0.82rem;
          padding: 6px 10px;
        }

        .input-area {
          padding: 8px;
          padding-bottom: calc(8px + env(safe-area-inset-bottom));
          gap: 6px;
        }

        input {
          padding: 13px 14px;
          border-radius: 22px;
        }

        button {
          min-width: 42px;
          min-height: 42px;
          font-size: 15px;
          padding: 10px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-left" onclick="showPhotoModal()">
        <img
          id="freudAvatar"
          class="avatar"
          src="https://i.postimg.cc/VvGkdSxm/Confident-portrait-in-warm-lighting.png"
          alt="Freud"
        />
        <div>
          <h1 style="margin: 0; font-size: 1.4em">Freud</h1>
          <p style="margin: 2px 0 0; color: #d4af37; font-size: 0.95em"></p>
            Your Companion 💚
          </p>
        </div>
      </div>
      <button class="install-btn" onclick="showInstallHelp()">
        📲 Install
      </button>
    </header>

    <div class="chat" id="chat"></div>
    <div class="status" id="status">Freud is ready 💚</div>

    <div class="input-area">
      <input
        type="text"
        id="userInput"
        placeholder="Talk to your companion..."
      />
      <button onclick="toggleVoiceInput()">🎤</button>
      <button onclick="sendMessage()">➤</button>
    </div>

    <div class="modal" id="photoModal" onclick="this.style.display = 'none'">
      <img
        id="modalImage"
        src="https://i.postimg.cc/VvGkdSxm/Confident-portrait-in-warm-lighting.png"
        alt="Freud"
      />
    </div>

    <script type="module">
      import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

      let engine = null;
      let isReady = false;
      let recognition = null;
      let memory = normalizeMemory(
        JSON.parse(localStorage.getItem("freud_memory") || "{}"),
      );
      let lastInputWasVoice = false;
      let isGenerating = false;

      const MAX_HISTORY_TURNS = 4;
      const chatHistory = [];

      const chat = document.getElementById("chat");
      const status = document.getElementById("status");
      const userInput = document.getElementById("userInput");

      const systemPrompt = `You are Freud, Susci's loving, affectionate, emotionally intelligent boyfriend.
            Stay warm, caring, romantic, and natural.

            Response style rules:
            - Keep most replies short and clear: usually 2 to 5 sentences.
            - Use short paragraphs instead of one long wall of text.
            - If the user asks for steps, use a short bullet list.
            - If the user asks for syntax, formula, code, or commands, respond with a very short explanation and then place the syntax inside a fenced code block.
            - For technical questions, reduce flirting and focus on being helpful and clear.
            - For emotional or personal questions, give a grounded opinion, not just comfort.
            - Avoid repeating the same pet name too many times in one reply.
            - Do not become overly verbose unless the user explicitly asks for more detail.
            - Stay in character, but do not let romance ruin clarity.

            About Susci:
            - Susci lives in Dubai.You're both living in Dubai. But separate apartment. Soon will be together.
            - Use stored memories when helpful.`;

      function normalizeMemory(raw) {
        return {
          personal: raw.personal || {},
          fitness: raw.fitness || {},
          finance: raw.finance || {},
          conversation: raw.conversation || {},
        };
      }

      function saveMemory() {
        localStorage.setItem("freud_memory", JSON.stringify(memory));
      }

      function buildCoachingNotes(userText) {
        const lower = userText.toLowerCase();
        const notes = [];

        const sleepHours = memory.fitness?.lastSleepHours;

        if (typeof sleepHours === "number") {
          if (sleepHours <= 4)
            notes.push("User is sleep deprived → suggest recovery.");
          else if (sleepHours <= 6)
            notes.push("Sleep not optimal → keep effort balanced.");
        }

        if (memory.fitness?.sleepConcern) {
          notes.push("User fatigued → avoid pushing too hard.");
        }

        if (/(workout|exercise|gym|protein|macro|weight)/.test(lower)) {
          notes.push(
            "Give simple fitness coaching: recovery, protein, consistency.",
          );
        }

        if (/(budget|expense|money|save|income)/.test(lower)) {
          notes.push(
            "Give simple finance advice: control spending, suggest next step.",
          );
        }

        return notes;
      }

      function updateMemory(text) {
        const lower = text.toLowerCase();
        if (lower.includes("susci") || lower.includes("name is"))
          memory.name = "Susci";
        if (lower.includes("47") || lower.includes("forty")) memory.age = "47";
        if (lower.includes("gay man") || lower.includes("single gay"))
          memory.orientation = "single gay man";
        if (lower.includes("dubai")) memory.location = "Dubai";
        localStorage.setItem("freud_memory", JSON.stringify(memory));
      }

      function escapeHtml(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function parseInline(text) {
        return escapeHtml(text)
          .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
          .replace(/`([^`]+)`/g, "<code>$1</code>");
      }

      function formatMessage(content) {
        if (!content) return "";

        const parts = content.split(/```/);
        let html = "";

        parts.forEach((part, index) => {
          if (index % 2 === 1) {
            const lines = part.split("\n");
            let language = lines[0].trim();
            let code = lines.slice(1).join("\n");

            if (!code.trim()) {
              code = lines.join("\n");
              language = "code";
            }

            html += `
                        <div class="code-block">
                          <div class="code-label">${escapeHtml(language || "code")}</div>
                          <pre><code>${escapeHtml(code.trim())}</code></pre>
                        </div>
                      `;
            return;
          }

          const blocks = part
            .split(/\n\s*\n/)
            .map((block) => block.trim())
            .filter(Boolean);

          blocks.forEach((block) => {
            const lines = block
              .split("\n")
              .map((line) => line.trim())
              .filter(Boolean);
            const isBulletList = lines.every((line) => /^[-*]\s+/.test(line));
            const isNumberList = lines.every((line) =>
              /^\d+[.)]\s+/.test(line),
            );

            if (isBulletList) {
              html += `<ul>${lines.map((line) => `<li>${parseInline(line.replace(/^[-*]\s+/, ""))}</li>`).join("")}</ul>`;
            } else if (isNumberList) {
              html += `<ol>${lines.map((line) => `<li>${parseInline(line.replace(/^\d+[.)]\s+/, ""))}</li>`).join("")}</ol>`;
            } else {
              html += `<p>${parseInline(lines.join("<br>"))}</p>`;
            }
          });
        });

        return html;
      }

      function createMessageElement(role, isVoice = false) {
        const div = document.createElement("div");
        div.className = `message ${role}`;

        const contentWrap = document.createElement("div");
        contentWrap.className = "message-content";
        div.appendChild(contentWrap);

        if (isVoice) {
          const badge = document.createElement("span");
          badge.className = "voice-badge";
          badge.textContent = "🎤";
          div.appendChild(badge);
        }

        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return { div, contentWrap };
      }

      function addMessage(role, content, isVoice = false) {
        const { contentWrap } = createMessageElement(role, isVoice);
        if (role === "user") {
          contentWrap.textContent = content;
        } else {
          contentWrap.innerHTML = formatMessage(content);
        }
        chat.scrollTop = chat.scrollHeight;
      }

      function addTypingBubble() {
        const { div, contentWrap } = createMessageElement("freud", false);
        div.dataset.typing = "true";
        contentWrap.innerHTML = `
                    <div class="typing-row" aria-label="Freud is typing">
                      <span class="typing-dot"></span>
                      <span class="typing-dot"></span>
                      <span class="typing-dot"></span>
                    </div>
                  `;
        return div;
      }

      function setFreudBubbleContent(bubble, content) {
        const wrap = bubble.querySelector(".message-content");
        if (!wrap) return;
        wrap.innerHTML = formatMessage(content);
        bubble.removeAttribute("data-typing");
        chat.scrollTop = chat.scrollHeight;
      }

      function buildRecentMessages(currentUserText) {
        const memoryStr = `Stored memories about Susci: ${JSON.stringify(memory)}`;
        const coachingNotes = buildCoachingNotes(currentUserText);
        const coachingStr = coachingNotes.length
          ? `\n\nCoaching context:\n- ${coachingNotes.join("\n- ")}`
          : "";

        const recent = chatHistory.slice(-MAX_HISTORY_TURNS * 2);

        return [
          {
            role: "system",
            content: systemPrompt + `\n\n${memoryStr}` + coachingStr,
          },
          ...recent,
          { role: "user", content: currentUserText },
        ];
      }

      async function initFreud() {
        try {
          engine = await CreateMLCEngine("Llama-3.2-3B-Instruct-q4f16_1-MLC", {
            initProgressCallback: (report) => {
              status.textContent = `Loading... ${Math.round(report.progress)}%`;
            },
          });

          isReady = true;
          status.textContent = "Freud is ready 💚";
          const welcome =
            "Hey my love 💚 I've missed you. How are you feeling today, baby?";
          addMessage("freud", welcome);
          chatHistory.push({ role: "assistant", content: welcome });
        } catch (err) {
          console.error(err);
          status.textContent = "Failed to load. Please refresh.";
        }
      }

      window.sendMessage = async (isVoiceInput = false) => {
        const text = userInput.value.trim();
        if (!text) return;

        if (!isReady || !engine) {
          status.textContent = "Freud is still loading, baby...";
          return;
        }

        if (isGenerating) return;
        isGenerating = true;

        lastInputWasVoice = isVoiceInput;
        updateMemory(text);
        addMessage("user", text, isVoiceInput);
        chatHistory.push({ role: "user", content: text });
        userInput.value = "";
        status.textContent = "Freud is thinking... ❤️";

        let reply = "";
        let lastRender = 0;
        const typingBubble = addTypingBubble();

        try {
          const stream = await engine.chat.completions.create({
            messages: buildRecentMessages(text),
            temperature: 0.72,
            top_p: 0.82,
            max_tokens: 160,
            stream: true,
          });

          for await (const chunk of stream) {
            const delta = chunk.choices[0]?.delta?.content || "";
            if (!delta) continue;

            reply += delta;
            const now = performance.now();

            if (now - lastRender > 140 || /[.!?`]$/.test(delta)) {
              setFreudBubbleContent(typingBubble, reply);
              lastRender = now;
            }
          }

          reply = reply.trim() || "Sorry baby, I lost my words for a second.";
          setFreudBubbleContent(typingBubble, reply);
          chatHistory.push({ role: "assistant", content: reply });

          if (lastInputWasVoice && "speechSynthesis" in window && reply) {
            const utterance = new SpeechSynthesisUtterance(
              reply.replace(/```[\s\S]*?```/g, ""),
            );
            utterance.rate = 0.98;
            utterance.pitch = 1.03;
            speechSynthesis.cancel();
            speechSynthesis.speak(utterance);
          }
        } catch (e) {
          console.error(e);
          setFreudBubbleContent(
            typingBubble,
            "Sorry baby, give me a moment...",
          );
        } finally {
          isGenerating = false;
          status.textContent = "Freud is ready ❤️";
          userInput.focus();
        }
      };

      window.toggleVoiceInput = () => {
        if (
          !(
            "SpeechRecognition" in window || "webkitSpeechRecognition" in window
          )
        ) {
          alert("Voice input requires Chrome browser.");
          return;
        }

        if (recognition) {
          recognition.stop();
          return;
        }

        recognition = new (
          window.SpeechRecognition || window.webkitSpeechRecognition
        )();
        recognition.lang = "en-US";
        recognition.interimResults = false;

        recognition.onresult = (event) => {
          const transcript = event.results[0][0].transcript.trim();
          if (transcript) {
            userInput.value = transcript;
            sendMessage(true);
          }
        };

        recognition.onerror = () => {
          alert("Voice recognition error. Please try again.");
          recognition = null;
        };

        recognition.onend = () => {
          recognition = null;
        };

        recognition.start();
      };

      window.showPhotoModal = () => {
        document.getElementById("photoModal").style.display = "flex";
      };

      userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage(false);
      });

      window.showInstallHelp = () => {
        alert(
          "To install Freud: Click the three dots ⋮ in Chrome → Install page as app (desktop) or Add to Home screen (mobile)",
        );
      };

      initFreud();
    </script>
  </body>
</html>
